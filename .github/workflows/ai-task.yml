name: AI Task Agent

on:
  repository_dispatch:
    types: [ai-task]

permissions:
  contents: write
  pull-requests: write

jobs:
  check-concurrency:
    runs-on: ubuntu-latest
    outputs:
      busy: ${{ steps.check.outputs.busy }}
    steps:
      - name: Check for existing open AI PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --repo "${{ github.repository }}" --label ai-generated --state open --json number --jq 'length')
          echo "Open AI PRs: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "busy=true" >> "$GITHUB_OUTPUT"
          else
            echo "busy=false" >> "$GITHUB_OUTPUT"
          fi

  run-agent:
    needs: check-concurrency
    if: needs.check-concurrency.outputs.busy == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use a PAT with the `workflow` scope if provided, so tickets that
          # need to touch .github/workflows/* can actually push those changes.
          # Falls back to the default GITHUB_TOKEN (which can never push
          # workflow file changes) if the secret isn't configured.
          token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Create branch
        run: |
          git config user.name "ai-task-bot"
          git config user.email "ai-task-bot@users.noreply.github.com"
          git checkout -b "ai-task/${{ github.event.client_payload.key }}"

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TICKET_KEY: ${{ github.event.client_payload.key }}
          TICKET_SUMMARY: ${{ github.event.client_payload.summary }}
          TICKET_DESCRIPTION: ${{ github.event.client_payload.description }}
          ALLOW_WORKFLOW_EDITS: ${{ secrets.WORKFLOW_PAT != '' }}
        run: python run_task.py

      - name: Check if blocked
        id: blocked_check
        run: |
          if [ -f "AGENT_BLOCKED.txt" ]; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.blocked_check.outputs.blocked == 'false'
        run: |
          git add -A
          git reset -- AGENT_SUMMARY.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit — agent produced no file changes."
            echo "No changes to commit." > AGENT_BLOCKED.txt
            exit 0
          fi
          git commit -m "AI Task ${{ github.event.client_payload.key }}: ${{ github.event.client_payload.summary }}"
          git push origin "ai-task/${{ github.event.client_payload.key }}"

      - name: Re-check if blocked after commit
        id: post_commit_blocked_check
        run: |
          if [ -f "AGENT_BLOCKED.txt" ]; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open draft PR
        if: steps.post_commit_blocked_check.outputs.blocked == 'false'
        env:
          # PR creation only needs pull-requests:write, which the default
          # GITHUB_TOKEN already has via the top-level `permissions:` block.
          # WORKFLOW_PAT is scoped for pushing workflow file changes, not PRs,
          # and typically lacks pull-request permissions.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(cat AGENT_SUMMARY.txt 2>/dev/null || echo "No summary provided")
          gh pr create \
            --draft \
            --title "[${{ github.event.client_payload.key }}] ${{ github.event.client_payload.summary }}" \
            --body "Automated PR for ticket ${{ github.event.client_payload.key }}.

          **What changed:** $SUMMARY

          ---
          Generated by the AI Task agent. Review carefully before merging." \
            --label "ai-generated" \
            --head "ai-task/${{ github.event.client_payload.key }}"

      - name: Report blocked ticket
        if: steps.blocked_check.outputs.blocked == 'true' || steps.post_commit_blocked_check.outputs.blocked == 'true'
        run: |
          echo "::warning::Agent could not complete ${{ github.event.client_payload.key }}: $(cat AGENT_BLOCKED.txt)"

  report-busy:
    needs: check-concurrency
    if: needs.check-concurrency.outputs.busy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Log skip
        run: echo "::warning::Skipped ${{ github.event.client_payload.key }} — an AI PR is already open."
